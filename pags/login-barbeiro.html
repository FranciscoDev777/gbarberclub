<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Barbearia do Guel</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {

            background: #0f0f0f;
            color: white;

            display: flex;
            align-items: center;
            justify-content: center;

            height: 100vh;

        }

        .login-container {

            background: #141414;

            padding: 40px;
            border-radius: 12px;

            width: 350px;

            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);

            border: 1px solid #2b2b2b;

        }

        .login-container h2 {

            text-align: center;
            margin-bottom: 25px;

            font-weight: 500;

        }

        input {

            width: 100%;
            padding: 12px;

            margin-bottom: 15px;

            border-radius: 8px;

            border: 1px solid #2b2b2b;

            background: #1c1c1c;

            color: white;

            outline: none;

        }

        input::placeholder {

            color: #999;

        }

        button {

            width: 100%;
            padding: 12px;

            border: none;

            border-radius: 8px;

            background: #6baed6;

            color: black;

            font-weight: 600;

            cursor: pointer;

            transition: 0.2s;

        }

        button:hover {

            background: #7fc0e4;

        }

        #msg {

            margin-top: 12px;

            text-align: center;

            font-size: 14px;

        }
    </style>

</head>

<body>

    <div class="login-container">

        <h2>Área Administrativa</h2>

        <input type="text" id="nome" placeholder="Usuário">

        <input type="password" id="senha" placeholder="Senha">

        <button onclick="login()">Entrar</button>

        <p id="msg"></p>

    </div>

    <script>

        const usuarios = ["Guel", "gustavo", "Gustavo", "guel"]

        const senhaCodificada = "R3VlbGRvc2NvcnRlMjAxOA=="

        function login() {

            let nome = document.getElementById("nome").value.toLowerCase()
            let senha = document.getElementById("senha").value

            let senhaCorreta = atob(senhaCodificada)

            if (usuarios.includes(nome) && senha === senhaCorreta) {

                document.getElementById("msg").style.color = "#4CAF50"
                document.getElementById("msg").innerText = "Login realizado com sucesso"

                setTimeout(() => {

                    if (nome === "guel") {

                        window.location.href = "painel-guel.html"

                    }

                    else if (nome === "gustavo") {

                        window.location.href = "painel-gustavo.html"

                    }

                }, 800)

            } else {

                document.getElementById("msg").style.color = "#ff4d4d"
                document.getElementById("msg").innerText = "Usuário ou senha incorretos"

            }

        }

    </script>

</body>

</html>
