<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Gustavo</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Segoe UI, sans-serif;
            background: #0d0d0d;
            color: white;
            margin: 0;
        }

        header {
            padding: 25px;
            background: #141414;
            border-bottom: 1px solid #2a2a2a;
        }

        .container {
            padding: 40px;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            flex: 1;
            background: #1a1a1a;
            padding: 25px;
            border-radius: 12px;
        }

        .valor {
            font-size: 32px;
            margin-top: 10px;
        }

        #abas {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #abas button {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #1a1a1a;
            color: white;
        }

        .ativa {
            background: #2b7fff !important;
        }

        .tabela {
            background: #1a1a1a;
            border-radius: 12px;
        }

        .linha {
            padding: 15px;
            border-top: 1px solid #2a2a2a;
        }

        .status {
            background: #2e7d32;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
        }

        .botao {
            padding: 8px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        .finalizar {
            background: #2b7fff;
            color: white;
        }

        .cancelar {
            background: #ff4d4d;
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <h1>Painel do Gustavo</h1>
    </header>

    <div class="container">

        <div class="cards">
            <div class="card">
                <h3>Cortes Restantes</h3>
                <div class="valor" id="restantes">0</div>
            </div>

            <div class="card">
                <h3>Ganhos Hoje</h3>
                <div class="valor">R$ <span id="ganhos">0</span></div>
            </div>

            <div class="card">
                <h3>Ganhos Futuros</h3>
                <div class="valor">R$ <span id="futuros">0</span></div>
            </div>
        </div>

        <div id="abas"></div>

        <div class="tabela">
            <div id="lista"></div>
        </div>

    </div>

    <script>
        const barbeiro = "gustavo"
        let dadosGlobais = []
        let diaSelecionado = null

        function formatarData(data) {
            const d = new Date(data)
            return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" })
        }

        function criarAbas(dados) {
            const abas = document.getElementById("abas")
            abas.innerHTML = ""

            const dias = [...new Set(dados.map(a => a.dia))].sort()

            dias.forEach((dia, i) => {
                const btn = document.createElement("button")
                btn.textContent = formatarData(dia)

                if (i === 0) {
                    btn.classList.add("ativa")
                    diaSelecionado = dia
                }

                btn.onclick = () => {
                    diaSelecionado = dia
                    renderizar()
                    atualizarAbas()
                }

                abas.appendChild(btn)
            })
        }

        function atualizarAbas() {
            document.querySelectorAll("#abas button").forEach(b => b.classList.remove("ativa"))

            const dias = [...new Set(dadosGlobais.map(a => a.dia))]
            const index = dias.indexOf(diaSelecionado)

            document.querySelectorAll("#abas button")[index]?.classList.add("ativa")
        }

        function renderizar() {
            let ganhos = 0
            let futuros = 0
            let restantes = 0

            const lista = document.getElementById("lista")
            lista.innerHTML = ""

            const filtrados = dadosGlobais.filter(a => a.dia === diaSelecionado)

            filtrados.forEach(a => {

                const valor = a.servico === "Corte + Barba" ? 50 : 30

                if (a.status === "Finalizado") ganhos += valor
                else {
                    futuros += valor
                    restantes++
                }

                const div = document.createElement("div")
                div.className = "linha"

                div.innerHTML = `
            <div><b>Data:</b> ${a.dia}</div>
            <div><b>Hora:</b> ${a.horario}</div>
            <div><b>Cliente:</b> ${a.nome}</div>
            <div><b>Serviço:</b> ${a.servico}</div>
            <div><b>Status:</b> <span class="status">${a.status}</span></div>

            ${a.status !== "Finalizado" ? `
                <button class="botao finalizar" onclick="finalizar(${a.id})">
                    Finalizar
                </button>
            ` : ""}

            <button class="botao cancelar" onclick="cancelar(${a.id})">
                Cancelar
            </button>
        `

                lista.appendChild(div)
            })

            document.getElementById("ganhos").textContent = ganhos
            document.getElementById("futuros").textContent = futuros
            document.getElementById("restantes").textContent = restantes
        }

        async function carregar() {
            const r = await fetch(`http://localhost:3000/agendamentos/${barbeiro}`)
            const dados = await r.json()

            dadosGlobais = dados

            criarAbas(dados)
            renderizar()
        }

        async function cancelar(id) {
            await fetch(`http://localhost:3000/cancelar/${id}`, { method: "DELETE" })
            carregar()
        }

        async function finalizar(id) {
            await fetch(`http://localhost:3000/finalizar/${id}`, { method: "PUT" })
            carregar()
        }

        carregar()
        setInterval(carregar, 4000)
    </script>

</body>

</html>
